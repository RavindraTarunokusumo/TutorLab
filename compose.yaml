services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: tutorlab
      POSTGRES_USER: tutorlab
      POSTGRES_PASSWORD: tutorlab
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - tutorlab-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutorlab -d tutorlab"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  tutorlab-postgres:
